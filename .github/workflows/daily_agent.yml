name: Run PubMed Daily Agent

on:
  schedule:
    # 每天 UTC 時間 00:00 執行（等於台灣時間早上 08:00）
    - cron: '0 0 * * *'
  # 允許在 GitHub 介面上手動按下按鈕觸發執行
  workflow_dispatch:

# 賦予 Actions 修改 Repository 檔案的權限
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 下載專案程式碼
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 安裝 Python 環境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. 安裝需要的套件
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. 執行 Python 腳本產生 index.html
      - name: Run Python script
        run: |
          python main.py

      # 5. 自動將最新的 index.html 提交 (Commit) 並推送 (Push) 回 Git 儲存庫
      - name: Commit and Push index.html
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto update pubmed report [skip ci]" && git push)
